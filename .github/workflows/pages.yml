# Build the TanStack Start app with Bun and deploy to GitHub Pages.
# Captures SSR-rendered HTML via wrangler for a fully pre-rendered site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with base path
        run: bun run build -- --base=${{ env.BASE_PATH }}/

      - name: Capture SSR-rendered HTML
        run: |
          ./node_modules/.bin/wrangler dev \
            --config dist/server/wrangler.json \
            --port 8788 --ip localhost --inspector-port 0 --local &
          WRANGLER_PID=$!

          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8788 2>/dev/null; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" != true ]; then
            echo "ERROR: wrangler dev did not start within 30 seconds"
            kill $WRANGLER_PID 2>/dev/null || true
            exit 1
          fi

          curl -sSL http://localhost:8788 > dist/client/index.html
          kill $WRANGLER_PID 2>/dev/null || true
          wait $WRANGLER_PID 2>/dev/null || true

          SIZE=$(wc -c < dist/client/index.html)
          echo "Captured dist/client/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: captured HTML is too small ($SIZE bytes)"
            head -5 dist/client/index.html
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
